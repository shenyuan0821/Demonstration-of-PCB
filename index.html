<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Presentation of videos related to the paper</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f4f4f4;
        }
        h1 { color: #333; }
        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        video {
            width: 100%;
            max-width: 800px;
            height: auto;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>My video playback page</h1>
        <! -- Core: Just one video tag, replace the 'src' value with your MP4 file name -->
        <video controls>
            <source src="Your Video. mp4" type="video/mp4">
            Your browser does not support HTML5 videos. Please upgrade or replace your browser.
        </video>
        <p>After loading the video, you can use the controls below the player to control it.</p>
    </div>
</body>
</html>
