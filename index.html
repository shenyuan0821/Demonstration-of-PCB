<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Presentation of videos related to the paper</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f4f4f4;
        }
        h1 { 
            color: #333; 
            margin-bottom: 30px;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 900px;
            width: 100%;
        }
        .video-wrapper {
            margin-bottom: 40px;
        }
        .video-title {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 10px;
            color: #444;
        }
        video {
            width: 100%;
            max-width: 800px;
            height: auto;
            border-radius: 5px;
        }
        p {
            color: #666;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>My Video Playback Page</h1>
        
        <!-- 第一个视频 -->
        <div class="video-wrapper">
            <div class="video-title">Demonstration of Agent</div>
            <video controls>
                <source src="./Demonstration of Agent.mp4" type="video/mp4">
                Your browser does not support HTML5 video. Please upgrade or replace your browser.
            </video>
        </div>
        
        <!-- 第二个视频 -->
        <div class="video-wrapper">
            <div class="video-title">Demonstration of App</div>
            <video controls>
                <source src="./Demonstration of App.mp4" type="video/mp4">
                Your browser does not support HTML5 video. Please upgrade or replace your browser.
            </video>
        </div>
        
        <p>Use the controls below each video to play, pause, and adjust volume.</p>
    </div>
</body>
</html>
